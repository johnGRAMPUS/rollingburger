
<div style="min-height: 500px; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; padding: 24px; border-radius: var(--border-radius-lg);">
  <div style="background: var(--color-background-primary); width: 100%; max-width: 320px; border-radius: 24px; padding: 30px 24px; border: 0.5px solid var(--color-border-tertiary);">
    <h2 style="font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 24px; color: var(--color-text-primary);">Disassemble burger</h2>

    <div style="margin-bottom: 24px;">
      <p style="font-size: 13px; line-height: 1.6; color: var(--color-text-primary); margin-bottom: 6px;">• Burn NFT to get Ingredient Tokens.</p>
      <p style="font-size: 13px; line-height: 1.6; color: var(--color-text-primary); margin-bottom: 6px;">• Trade ingredients at mint.club.</p>
      <p style="font-size: 13px; font-weight: 500; color: var(--color-text-danger); margin-top: 10px;">⚠ Burned NFT cannot be recovered.</p>
    </div>

    <div style="background: var(--color-background-secondary); border-radius: 16px; padding: 16px; margin-bottom: 24px;">
      <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px;">
        <span style="color: var(--color-text-secondary);">Cost</span>
        <span style="font-weight: 500; color: var(--color-text-primary);">1,000 GRAM</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 13px;">
        <span style="color: var(--color-text-secondary);">Balance</span>
        <span style="font-weight: 500; color: var(--color-text-primary);">40,000 GRAM</span>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px;">
      <button style="width: 100%; padding: 15px; border-radius: 16px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; background: #0052FF; color: #fff; border-top-right-radius: 4px;">Disassemble</button>
      <button style="width: 100%; padding: 15px; border-radius: 16px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; background: transparent; color: var(--color-text-secondary);">Cancel</button>
    </div>

    <div style="padding-top: 20px; border-top: 0.5px solid var(--color-border-tertiary);">
      <a href="https://base.app/coin/base-mainnet/0x856D602E73545deAA1491a3726cF628d49f74F51" target="_blank" style="color: #0052FF; text-decoration: none; font-size: 13px; font-weight: 500; display: inline-block; margin-bottom: 14px;">Get GRAM Token in Base App →</a>

      <div style="display: flex; align-items: center; background: var(--color-background-secondary); padding: 10px 14px; border-radius: 12px; gap: 10px;">
        <span id="caDisplay" style="flex: 1; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; color: var(--color-text-secondary); text-align: left;">0x856D...4F51</span>
        <button id="copyBtn" title="Copy Address" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; color: var(--color-text-secondary); padding: 4px;">
          <svg id="copyIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const fullAddr = "0x856D602E73545deAA1491a3726cF628d49f74F51";
  const shortened = fullAddr.slice(0, 6) + "..." + fullAddr.slice(-4);
  document.getElementById('caDisplay').textContent = shortened;

  document.getElementById('copyBtn').addEventListener('click', function() {
    const btn = this;
    const copy = () => {
      btn.innerHTML = '<span style="font-size:11px;color:#0052FF;font-weight:500;">Copied!</span>';
      setTimeout(() => {
        btn.innerHTML = '<svg id="copyIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
      }, 1500);
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(fullAddr).then(copy);
    } else {
      const t = document.createElement("textarea");
      t.value = fullAddr;
      t.style.cssText = "position:fixed;left:-9999px;top:0";
      document.body.appendChild(t);
      t.focus(); t.select();
      try { document.execCommand('copy'); copy(); } catch(e) {}
      document.body.removeChild(t);
    }
  });
</script>
