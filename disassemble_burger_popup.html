<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rolling Burger - Disassemble</title>
    <style>
        * {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 24px;
        }

        .disassemble-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 320px;
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .title {
            font-size: 20px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
            color: #111111;
        }

        .info-section {
            margin-bottom: 24px;
        }

        .info-text {
            font-size: 13px;
            line-height: 1.6;
            color: #111111;
            margin-bottom: 6px;
            display: block;
        }

        .warning-text {
            font-size: 13px;
            font-weight: 700;
            color: #FF4D4D;
            margin-top: 10px;
            display: block;
        }

        .data-box {
            background: #F8F9FA;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .data-row:last-child { margin-bottom: 0; }
        .label { color: #666666; }
        .value { font-weight: 700; color: #111111; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: #0052FF;
            color: #fff;
            border-radius: 16px;
        }

        .btn-ghost {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #666666;
        }

        .footer {
            padding-top: 20px;
            border-top: 1px solid #EEEEEE;
        }

        .link-text {
            color: #0052FF;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 14px;
        }

        .ca-wrapper {
            display: flex;
            align-items: center;
            background: #F1F3F5;
            padding: 10px 14px;
            border-radius: 12px;
            gap: 10px;
        }

        .ca-address {
            flex: 1;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 11px;
            color: #495057;
            text-align: left;
        }

        .copy-button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: #666666;
            padding: 4px;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="disassemble-card">
        <h1 class="title">Disassemble Burger</h1>

        <div class="info-section">
            <span class="info-text">• Burn NFT to get Ingredient Tokens.</span>
            <span class="info-text">• Trade ingredients at mint.club.</span>
			<span class="info-text">• Trade ingredients at mint.club.</span>
            <span class="warning-text">⚠️ Burned NFT cannot be recovered.</span>
        </div>

        <div class="data-box">
            <div class="data-row">
                <span class="label">Cost</span>
                <span class="value">1,000 GRAM</span>
            </div>
            <div class="data-row">
                <span class="label">Balance</span>
                <span class="value">40,000 GRAM</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary">Disassemble</button>
            <button class="btn-ghost">Cancel</button>
        </div>

        <div class="footer">
            <a href="https://base.app/coin/base-mainnet/0x856D602E73545deAA1491a3726cF628d49f74F51" target="_blank" class="link-text">
                Get GRAM Token in Base App →
            </a>

            <div class="ca-wrapper">
                <span class="ca-address" id="caDisplay">0x856D...4F51</span>
                <button class="copy-button" id="copyBtn" title="Copy Address">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const fullAddr = "0x856D602E73545deAA1491a3726cF628d49f74F51";
    document.getElementById('caDisplay').textContent = fullAddr.slice(0, 6) + "..." + fullAddr.slice(-4);

    document.getElementById('copyBtn').addEventListener('click', function() {
        const btn = this;
        const svgIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';

        const showSuccess = () => {
            btn.innerHTML = '<span style="font-size:11px;color:#0052FF;font-weight:700;">Copied!</span>';
            setTimeout(() => { btn.innerHTML = svgIcon; }, 1500);
        };

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(fullAddr).then(showSuccess);
        } else {
            const t = document.createElement("textarea");
            t.value = fullAddr;
            t.style.cssText = "position:fixed;left:-9999px;top:0";
            document.body.appendChild(t);
            t.focus();
            t.select();
            try { document.execCommand('copy'); showSuccess(); } catch(e) {}
            document.body.removeChild(t);
        }
    });
</script>

</body>
</html>
